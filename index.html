<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <script>
            try {
                var initialTheme = 'light';
                if (
                    localStorage.theme === 'dark' ||
                    (!('theme' in localStorage) &&
                        window.matchMedia('(prefers-color-scheme: dark)').matches)
                ) {
                    initialTheme = 'dark';
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }

                var themeLink = document.createElement('link');
                themeLink.id = 'theme-link';
                themeLink.rel = 'stylesheet';
                themeLink.href =
                    initialTheme === 'dark'
                        ? 'https://unpkg.com/primereact/resources/themes/lara-dark-amber/theme.css'
                        : 'https://unpkg.com/primereact/resources/themes/lara-light-amber/theme.css';
                document.head.appendChild(themeLink);
            } catch (_) {}
        </script>
        <link rel="icon" type="image/svg+xml" href="/chrononews.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="google-site-verification" content="%VITE_GOOGLE_VERIFICATION_CODE%" />
        <!--ssr-head-outlet-->
        <style id="anti-fouc">
            body {
                overflow: hidden;
            }
            #root {
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.2s ease-in-out;
            }
        </style>
    </head>
    <body>
        <div id="root"><!--ssr-outlet--></div>
        <script>
            window.__INITIAL_DATA__ = undefined;
        </script>
        <script type="module" src="/src/entry-client.tsx"></script>
    </body>
</html>
